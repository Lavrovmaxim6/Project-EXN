<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activity Log — Audit-AI</title>
  <style>
    :root {
      --bg:        #f5f5f7;
      --surface:   #ffffff;
      --surface2:  #f5f5f7;
      --surface3:  #e8e8ed;
      --border:    rgba(0,0,0,0.08);
      --border2:   rgba(0,0,0,0.14);
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
      --blue:      #0071e3;
      --blue-dim:  rgba(0,113,227,0.08);
      --red:       #ff3b30;
      --amber:     #ff9f0a;
      --green:     #34c759;
      --text:      #1d1d1f;
      --text2:     #6e6e73;
      --text3:     #aeaeb2;
      --sans:      -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
      --mono:      "SF Mono", ui-monospace, Menlo, monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Sidebar ── */
    .sidebar { width: 228px; background: #fff; border-right: 1px solid rgba(0,0,0,0.08); display: flex; flex-direction: column; flex-shrink: 0; position: fixed; top: 0; left: 0; bottom: 0; z-index: 50; }
    .sidebar-logo { padding: 28px 20px 22px; border-bottom: 1px solid rgba(0,0,0,0.08); cursor: pointer; transition: background 0.12s; }
    .sidebar-logo:hover { background: rgba(0,113,227,0.04); }
    .logo-mark { display: flex; align-items: center; gap: 10px; margin-bottom: 3px; }
    .logo-icon { width: 34px; height: 34px; background: #0071e3; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .logo-text { font-size: 17px; font-weight: 700; color: #1d1d1f; letter-spacing: -0.03em; }
    .logo-sub { font-size: 11px; color: #aeaeb2; padding-left: 44px; }
    .sidebar-nav { padding: 12px 10px; flex: 1; }
    .nav-section { font-size: 11px; font-weight: 600; color: #aeaeb2; letter-spacing: 0.04em; text-transform: uppercase; padding: 14px 10px 5px; }
    .nav-item { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: 8px; font-size: 14px; font-weight: 500; color: #6e6e73; cursor: pointer; transition: background 0.12s, color 0.12s; margin-bottom: 1px; }
    .nav-item:hover { background: #f5f5f7; color: #1d1d1f; }
    .nav-item.active { background: rgba(0,113,227,0.08); color: #0071e3; font-weight: 600; }
    .nav-item.active .nav-icon { opacity: 1; }
    .nav-item.home-item { background: rgba(0,113,227,0.05); color: #0071e3; font-weight: 600; border: 1px solid rgba(0,113,227,0.14); }
    .nav-item.home-item .nav-icon { opacity: 0.85; }
    .nav-item.home-item:hover { background: rgba(0,113,227,0.1); }
    .nav-icon { width: 18px; height: 18px; opacity: 0.5; flex-shrink: 0; }
    .home-badge { margin-left: auto; font-size: 9px; font-weight: 700; letter-spacing: 0.06em; color: #0071e3; opacity: 0.55; text-transform: uppercase; }
    .sidebar-footer { padding: 16px; border-top: 1px solid rgba(0,0,0,0.08); }
    .status-pill { display: flex; align-items: center; gap: 8px; background: rgba(52,199,89,0.1); border-radius: 10px; padding: 9px 13px; font-size: 12px; font-weight: 600; color: #248a3d; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #34c759; box-shadow: 0 0 0 2px rgba(52,199,89,0.25); animation: sidebar-pulse 2.4s infinite; flex-shrink: 0; }
    @keyframes sidebar-pulse { 0%, 100% { box-shadow: 0 0 0 2px rgba(52,199,89,0.25); } 50% { box-shadow: 0 0 0 5px rgba(52,199,89,0.1); } }
    .main { margin-left: 228px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }

    /* ── Topbar ── */
    .topbar {
      padding: 14px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      position: sticky;
      top: 0;
      z-index: 40;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--surface);
      border: 1px solid var(--border2);
      color: var(--blue);
      padding: 6px 13px 6px 9px;
      border-radius: 20px;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: var(--shadow-sm);
      flex-shrink: 0;
    }
    .back-btn:hover {
      background: var(--blue-dim);
      border-color: rgba(0,113,227,0.2);
      transform: translateX(-1px);
    }

    .topbar-info { flex: 1; }
    .topbar-title { font-size: 20px; font-weight: 700; letter-spacing: -0.03em; }
    .topbar-sub   { font-size: 12px; color: var(--text3); margin-top: 2px; }

    .updated-chip {
      font-size: 12px;
      color: var(--text3);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 12px;
      font-weight: 500;
    }

    /* ── Content ── */
    .content { padding: 28px 32px; display: flex; flex-direction: column; gap: 16px; }

    /* ── Stat strip ── */
    .stat-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .stat-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 20px;
      box-shadow: var(--shadow-sm);
    }

    .stat-chip-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text3);
      margin-bottom: 8px;
    }

    .stat-chip-value {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      color: var(--text);
    }

    .stat-chip-value.red    { color: var(--red); }
    .stat-chip-value.amber  { color: var(--amber); }
    .stat-chip-value.green  { color: var(--green); }

    /* ── Chart card ── */
    .chart-card {
      background: var(--surface);
      border-radius: 16px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .chart-header {
      padding: 15px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .chart-title { font-size: 14px; font-weight: 600; color: var(--text); }
    .chart-sub   { font-size: 12px; color: var(--text3); }

    /* ── Main pie grid ── */
    .pie-grid {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 16px;
      align-items: start;
    }

    .pie-right-col {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Big AI tools donut ── */
    .big-donut-body {
      display: flex;
      align-items: center;
      gap: 32px;
      padding: 28px 28px;
    }

    .big-donut-canvas-wrap { flex-shrink: 0; }

    /* ── Big legend ── */
    .big-legend {
      flex: 1;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .big-leg-row {
      display: grid;
      grid-template-columns: 10px 90px 1fr 38px 52px;
      align-items: center;
      gap: 12px;
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }

    .big-leg-row:last-child { border-bottom: none; }
    .big-leg-row:hover { background: var(--surface2); }

    .big-leg-swatch {
      width: 10px; height: 10px;
      border-radius: 50%;
    }

    .big-leg-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .big-leg-track {
      height: 5px;
      background: var(--surface3);
      border-radius: 3px;
      overflow: hidden;
    }

    .big-leg-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.6s ease;
    }

    .big-leg-pct {
      font-size: 12px;
      font-weight: 600;
      font-family: var(--mono);
      color: var(--text2);
      text-align: right;
    }

    .big-leg-count {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--text3);
      text-align: right;
    }

    /* ── Small donut ── */
    .small-donut-body {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 20px;
    }

    .small-donut-canvas-wrap { flex-shrink: 0; }

    .small-legend {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-right: 6px;
    }

    .small-leg-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .small-leg-left {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      min-width: 0;
    }

    .small-leg-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .small-leg-name {
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
    }

    .small-leg-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      flex-shrink: 0;
      gap: 1px;
    }

    .small-leg-pct {
      font-size: 12px;
      font-weight: 700;
      font-family: var(--mono);
      color: var(--text);
      line-height: 1;
    }

    .small-leg-count {
      font-size: 10px;
      font-family: var(--mono);
      color: var(--text3);
      line-height: 1;
    }

    /* ── Horizontal bar lists ── */
    .charts-3col {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .hbars-body {
      padding: 8px 0 4px;
    }

    .hbar-item {
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 8px 20px;
      transition: background 0.1s;
    }

    .hbar-item:hover { background: var(--surface2); }

    .hbar-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .hbar-name {
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .hbar-count {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--text3);
      flex-shrink: 0;
    }

    .hbar-track {
      height: 4px;
      background: var(--surface3);
      border-radius: 2px;
      overflow: hidden;
    }

    .hbar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    .empty-msg {
      padding: 32px 20px;
      text-align: center;
      font-size: 13px;
      color: var(--text3);
    }
  </style>
</head>
<body>

<nav class="sidebar">
  <div class="sidebar-logo" data-nav="dashboard.html">
    <div class="logo-mark"><div class="logo-icon">A</div><div class="logo-text">Audit-AI</div></div>
    <div class="logo-sub">AI Activity Monitor</div>
  </div>
  <div class="sidebar-nav">
    <div class="nav-section">Monitor</div>
    <div class="nav-item home-item" data-nav="dashboard.html">
      <svg class="nav-icon" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12l4-4 3 3 4-5 3 3"/><rect x="1" y="1" width="16" height="16" rx="3"/></svg>
      Dashboard<span class="home-badge">Main</span>
    </div>
    <div class="nav-item active" data-nav="activity-log.html">
      <svg class="nav-icon" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="14" height="12" rx="2"/><path d="M5 7h8M5 10h5"/></svg>
      Activity Log
    </div>
    <div class="nav-item" data-nav="devices.html">
      <svg class="nav-icon" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="16" height="10" rx="2"/><path d="M6 14v2M12 14v2M4 16h10"/></svg>
      Devices
    </div>
    <div class="nav-section">Manage</div>
    <div class="nav-item" data-nav="users.html">
      <svg class="nav-icon" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="6" r="3"/><path d="M3 16c0-3.3 2.7-6 6-6s6 2.7 6 6"/></svg>
      Users
    </div>
    <div class="nav-item" data-nav="policies.html">
      <svg class="nav-icon" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 2l1.7 3.4L15 6.3l-3 2.9.7 4.1L9 11.5l-3.7 1.8.7-4.1-3-2.9 4.3-.9z"/></svg>
      About & Policies
    </div>
    <div class="nav-item" data-nav="reports.html">
      <svg class="nav-icon" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 14l4-6 3 4 2-2 3 4"/><rect x="1" y="1" width="16" height="16" rx="3"/></svg>
      Reports
    </div>
  </div>
  <div class="sidebar-footer"><div class="status-pill"><div class="status-dot"></div>Monitoring Active</div></div>
</nav>

<div class="main">
<div class="topbar">
  <div class="topbar-info">
    <div class="topbar-title">Activity Log</div>
  </div>
</div>
<div class="content"></div>
</div><!-- .main -->

<script src="activity-log.js"></script>
</body>
</html>
